services:

  # ---------------------------------------------------------------------------
  # PHP-FPM — Laravel application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      RUN_MIGRATIONS: "true"
    env_file:
      - .env
    volumes:
      # Mount source code so changes are reflected without rebuilding
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - bootstrap_cache_data:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # PostgreSQL — database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-gestiondeinvitaciones}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/create-test-db.sh:/docker-entrypoint-initdb.d/create-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-gestiondeinvitaciones}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # Redis — cache store (phpredis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3", "--max-time=3600"]
    environment:
      RUN_MIGRATIONS: "false"
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - bootstrap_cache_data:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      RUN_MIGRATIONS: "false"
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - bootstrap_cache_data:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

# -----------------------------------------------------------------------------
# Named volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  vendor_data:
    driver: local
  bootstrap_cache_data:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  app-network:
    driver: bridge
