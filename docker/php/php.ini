[PHP]
; --- Error handling ---
; In production set display_errors = Off and rely on log_errors
display_errors    = Off
log_errors        = On
error_reporting   = E_ALL & ~E_DEPRECATED & ~E_STRICT

; --- Limits ---
memory_limit          = 256M
max_execution_time    = 300
max_input_time        = 300
post_max_size         = 64M
upload_max_filesize   = 64M
max_file_uploads      = 20

; --- Date ---
date.timezone = UTC

; --- Session ---
session.gc_maxlifetime = 7200

; =============================================================================
; OPcache — significant performance boost; keep save_comments=1 for annotations
; =============================================================================
[opcache]
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 10000
; Set to 0 in production; use 2 in development for auto-revalidation
opcache.revalidate_freq        = 0
opcache.save_comments          = 1
opcache.fast_shutdown          = 1
opcache.enable_cli             = 0
